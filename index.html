<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Blog</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <a class="site-title" href="#/">My Blog</a>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">🌙</button>
</header>
<main id="app"></main>

<section class="apps-section">
  <div class="apps-section-inner">
    <h2 class="apps-heading">미니 웹앱</h2>
    <div class="app-cards">
      <a class="app-card" href="apps/2048/index.html">
        <div class="app-card-preview" aria-hidden="true">
          <span class="preview-tile t2">2</span>
          <span class="preview-tile t4">4</span>
          <span class="preview-tile t8">8</span>
          <span class="preview-tile t2">2</span>
        </div>
        <div class="app-card-body">
          <h3 class="app-card-title">2048</h3>
          <p class="app-card-desc">방향키로 숫자 타일을 밀어 합치는 퍼즐 게임</p>
        </div>
      </a>
      <a class="app-card" href="apps/pixel-art/index.html">
        <div class="app-card-preview pixel-preview" aria-hidden="true">
          <span class="pixel-cell" style="background:#ef4444"></span>
          <span class="pixel-cell" style="background:#ef4444"></span>
          <span class="pixel-cell"></span>
          <span class="pixel-cell" style="background:#3b82f6"></span>
          <span class="pixel-cell" style="background:#ef4444"></span>
          <span class="pixel-cell" style="background:#facc15"></span>
          <span class="pixel-cell" style="background:#facc15"></span>
          <span class="pixel-cell" style="background:#3b82f6"></span>
          <span class="pixel-cell"></span>
          <span class="pixel-cell" style="background:#facc15"></span>
          <span class="pixel-cell" style="background:#facc15"></span>
          <span class="pixel-cell"></span>
          <span class="pixel-cell" style="background:#22c55e"></span>
          <span class="pixel-cell"></span>
          <span class="pixel-cell" style="background:#22c55e"></span>
          <span class="pixel-cell"></span>
        </div>
        <div class="app-card-body">
          <h3 class="app-card-title">픽셀 아트 에디터</h3>
          <p class="app-card-desc">16x16 격자에 도트를 찍어 그림을 그리고 PNG로 저장</p>
        </div>
      </a>
    </div>
  </div>
</section>

<script src="js/theme.js"></script>
<script src="js/markdown.js"></script>
<script src="js/views.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>
</body>
</html>
